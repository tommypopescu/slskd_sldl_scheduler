
version: '3'
services:
  web:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
  slskd:
    image: slskd/slskd
    ports:
      - "5030:5030"
    environment:
      - SLSKD_REMOTE_CONFIGURATION=true
      - SLSKD_DOWNLOADS_DIR=/downloads
    volumes:
      - ./downloads:/downloads
